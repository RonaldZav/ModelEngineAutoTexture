server:
  host: "0.0.0.0"
  port: 8080
  external-url: "http://127.0.0.1:8080/resourcepack.zip"

resource-pack:
  force: true
  prompt: "Este servidor usa texturas de ModelEngine, por favor acepta los paquetes de texturas para entrar."
  path: "plugins/ModelEngine/resource pack.zip"
  send-hash: true # Comprueba la integridad del paquete.
  delay-ticks: 40 # Tiempo de espera entre que el jugador se une y el envio de paquete de texturas.

debug: false # Depuracion util durante el desarrollo. Activalo para obtener logs completos si planeas reportar algun bug.
